# --- Terminal / colors -------------------------------------------------
# Inside tmux, advertise tmux-256color so apps pick the right capabilities.
set -g default-terminal "tmux-256color"
# Truecolor passthrough for the *outer* terminal. Broadly compatible form;
# on tmux >= 3.2 you can instead use:  set -as terminal-features ',*:RGB'
set -ga terminal-overrides ",*256col*:Tc"

# UTF-8 is assumed on modern tmux (>= 2.2) — no `utf8` option needed.

# --- General behavior --------------------------------------------------
set -g history-limit 50000          # big scrollback for training logs
set -g mouse on                     # scroll / select / resize with mouse
set -g base-index 1                 # windows start at 1
setw -g pane-base-index 1
set -g renumber-windows on          # keep window numbers gapless
set -sg escape-time 10              # snappier ESC (vim-friendly)
set -g focus-events on
set -g set-titles on
set -g set-titles-string "#S:#W"
setw -g aggressive-resize on        # resize to the attached client, not the smallest

# --- Prefix ------------------------------------------------------------
# Keep C-b, but also bind C-a as a second prefix (easier over SSH).
set -g prefix2 C-a
bind C-a send-prefix -2

# --- Reload ------------------------------------------------------------
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# --- Splits & navigation ----------------------------------------------
# Intuitive split keys that keep the current directory.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# vim-style pane movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize with repeat (hold prefix briefly)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Copy mode (vi) ----------------------------------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# --- Status bar --------------------------------------------------------
set -g status-interval 5
set -g status-style "bg=colour234,fg=colour245"
set -g status-left-length 30
set -g status-left "#[fg=colour114,bold] #S #[default]"
set -g status-right "#[fg=colour245]#H #[fg=colour114]%H:%M "
setw -g window-status-current-style "fg=colour234,bg=colour114,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "
